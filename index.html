<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberCTF - Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="api.js"></script>
</head>
<body>

    <div class="container" style="max-width: 400px; margin-top: 10vh;">
        <h1>ACCESO AL SISTEMA</h1>
        <p style="text-align: center;">Introduce tu alias para comenzar el entrenamiento.</p>
        
        <input type="text" id="usernameInput" placeholder="Nombre de usuario" autocomplete="off">
        <button onclick="login()">INICIAR SESIÓN</button>
        <p id="statusMsg" style="text-align: center; margin-top: 10px;"></p>
    </div>

    <script>
        // Redirigir si ya está logueado
        if (localStorage.getItem("ctf_username")) {
            window.location.href = "dashboard.html";
        }

        async function login() {
            const user = document.getElementById("usernameInput").value.trim();
            const status = document.getElementById("statusMsg");
            
            if (!user) {
                status.innerText = "Error: Nombre vacío.";
                return;
            }

            status.innerText = "Conectando al servidor...";
            
            try {
                // Llama a la función de api.js
                await registrarUsuario(user);
                // Si funciona (o si el usuario ya existe y Supabase devuelve un error controlado que ajustaste)
                localStorage.setItem("ctf_username", user);
                window.location.href = "dashboard.html";
            } catch (error) {
                // Si el usuario ya existe, simplemente lo dejamos entrar
                if (error.message.includes("ya existe")) {
                    localStorage.setItem("ctf_username", user);
                    window.location.href = "dashboard.html";
                } else {
                    status.innerText = "Error en la conexión.";
                }
            }
        }
    </script>
</body>
</html>
