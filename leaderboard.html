<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberCTF // RANKING GLOBAL</title>
    <link rel="stylesheet" href="style.css">
    <script src="api.js"></script>
    <style>
        .rank-row {
            display: grid;
            grid-template-columns: 56px 1fr 130px 140px;
            align-items: center;
            padding: 13px 16px;
            border-radius: var(--radius);
            border: 1px solid transparent;
            margin-bottom: 6px;
            transition: background .15s, border-color .15s;
        }
        .rank-row:hover { background: var(--bg3); border-color: var(--border); }
        .rank-row.my-team {
            background: rgba(0,212,255,0.04);
            border-color: rgba(0,212,255,0.2);
        }

        .rank-number {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 800;
            color: var(--text-dim);
            text-align: center;
        }
        .rank-number.gold   { color: var(--yellow); text-shadow: 0 0 12px rgba(255,204,0,0.3); }
        .rank-number.silver { color: var(--cyan); }
        .rank-number.bronze { color: var(--green); }

        .team-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-bright);
        }

        .team-members {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .member-tag {
            font-size: 10px;
            padding: 1px 8px;
            border-radius: 10px;
            background: var(--bg4);
            border: 1px solid var(--border2);
            color: var(--text-dim);
        }

        .rank-score {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 800;
            color: var(--yellow);
        }

        .rank-bar-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .rank-bar-track {
            flex: 1;
            height: 3px;
            background: var(--border2);
            border-radius: 2px;
            overflow: hidden;
        }
        .rank-bar-fill {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, var(--green-dim), var(--green));
            box-shadow: 0 0 6px var(--green-glow);
            transition: width .8s ease;
        }

        .auto-refresh-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }
        .refresh-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--green);
            animation: blink 2s step-end infinite;
        }

        .my-team-chip {
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 10px;
            background: rgba(0,212,255,0.1);
            border: 1px solid rgba(0,212,255,0.25);
            color: var(--cyan);
            margin-left: 8px;
            vertical-align: middle;
        }

        @media (max-width: 600px) {
            .rank-row { grid-template-columns: 44px 1fr auto; }
            .rank-bar-wrap { display: none; }
        }
    </style>
</head>
<body>

<div class="nav">
    <div class="nav-brand">CYBERCTF</div>
    <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="leaderboard.html" class="active">Ranking</a>
        <a href="terminal.html">Terminal</a>
        <a href="#" onclick="logout()">Salir</a>
    </div>
    <div class="nav-user">
        <span id="navUser">—</span>
        <span class="team-badge" id="navTeam">—</span>
    </div>
</div>

<div class="page-wrap">

    <!-- Header -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;" class="fade-up">
        <div>
            <h2 style="margin-bottom:4px;">Tabla de Clasificación</h2>
            <div style="font-size:11px; color:var(--text-dim); letter-spacing:1px;">PUNTAJES POR EQUIPO</div>
        </div>
        <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
            <div class="auto-refresh-badge">
                <div class="refresh-dot"></div>
                <span id="lastUpdate">—</span>
            </div>
            <button onclick="cargarRanking()" style="padding:7px 18px; font-size:10px;">↻ Actualizar</button>
        </div>
    </div>

    <!-- Podium -->
    <div class="panel fade-up fade-up-d1" style="padding: 28px 24px;">
        <div class="podium" id="podium">
            <div style="color:var(--text-dim); font-size:12px;">Cargando…</div>
        </div>
    </div>

    <!-- Rankings list -->
    <div class="panel fade-up fade-up-d2">
        <div id="rankingBody">
            <div style="color:var(--text-dim); font-size:12px; padding:12px 0;">Cargando rankings…</div>
        </div>
    </div>

    <div style="text-align:center; padding-bottom:24px;">
        <div class="auto-refresh-badge">
            <div class="refresh-dot"></div>
            <span style="letter-spacing:2px;">AUTO-REFRESCO CADA 30 SEGUNDOS</span>
        </div>
    </div>
</div>

<script>
const currentUser  = localStorage.getItem("ctf_username");
const equipoId     = localStorage.getItem("ctf_equipo_id");
const equipoNombre = localStorage.getItem("ctf_equipo_nombre") || "equipo";

if (!currentUser || !equipoId) window.location.href = "index.html";

document.getElementById("navUser").textContent = currentUser;
document.getElementById("navTeam").textContent = equipoNombre;

function logout() {
    localStorage.removeItem("ctf_username");
    localStorage.removeItem("ctf_equipo_id");
    localStorage.removeItem("ctf_equipo_nombre");
    window.location.href = "index.html";
}

function esc(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// Cache members per team
const membersCache = {};

async function loadTeamMembers(tid) {
    if (membersCache[tid]) return membersCache[tid];
    try {
        const m = await obtenerMiembrosEquipo(tid);
        membersCache[tid] = m;
        return m;
    } catch { return []; }
}

async function cargarRanking() {
    const datos = await obtenerLeaderboard();
    const body = document.getElementById("rankingBody");

    if (datos.length === 0) {
        body.innerHTML = `<div style="color:var(--text-dim); font-size:12px; padding:12px;">Aún no hay equipos registrados.</div>`;
        return;
    }

    // Podium
    const podium = document.getElementById("podium");
    const top3 = datos.slice(0, 3);
    const displayOrder = [1, 0, 2]; // 2nd, 1st, 3rd
    podium.innerHTML = "";
    displayOrder.forEach(idx => {
        if (!top3[idx]) return;
        const t = top3[idx];
        const place = idx + 1;
        const el = document.createElement("div");
        el.className = `podium-item place-${place}`;
        const labels = { 1: "★", 2: "▲", 3: "▲" };
        el.innerHTML = `
            <div class="podium-rank">#${place}</div>
            <div class="podium-name">${esc(t.nombre)}</div>
            <div class="podium-block">${labels[place]}</div>
            <div class="podium-score">${t.puntaje.toLocaleString()} pts</div>
        `;
        podium.appendChild(el);
    });

    // Full list
    const maxScore = Math.max(datos[0]?.puntaje || 1, 1);
    body.innerHTML = "";

    for (const [i, team] of datos.entries()) {
        const rank = i + 1;
        const isMe = team.id === equipoId;
        const pct = Math.round((team.puntaje / maxScore) * 100);

        const rankClass = rank === 1 ? "gold" : rank === 2 ? "silver" : rank === 3 ? "bronze" : "";

        // Load members async
        const members = await loadTeamMembers(team.id);
        const memberTags = members.slice(0, 5).map(m =>
            `<span class="member-tag">${esc(m.username)}</span>`
        ).join("") + (members.length > 5 ? `<span class="member-tag">+${members.length-5}</span>` : "");

        const row = document.createElement("div");
        row.className = `rank-row ${isMe ? 'my-team' : ''}`;
        row.innerHTML = `
            <div class="rank-number ${rankClass}">${rank}</div>
            <div>
                <div class="team-name">
                    ${isMe ? '▶ ' : ''}${esc(team.nombre)}
                    ${isMe ? `<span class="my-team-chip">tu equipo</span>` : ''}
                </div>
                <div class="team-members">${memberTags || '<span class="member-tag" style="color:var(--text-dim)">sin miembros</span>'}</div>
            </div>
            <div class="rank-score">${team.puntaje.toLocaleString()}</div>
            <div class="rank-bar-wrap">
                <div class="rank-bar-track">
                    <div class="rank-bar-fill" style="width:${pct}%"></div>
                </div>
                <span style="font-size:10px; color:var(--text-dim); width:32px; text-align:right;">${pct}%</span>
            </div>
        `;
        body.appendChild(row);
    }

    document.getElementById("lastUpdate").textContent =
        "Actualizado " + new Date().toLocaleTimeString("es-CL");
}

cargarRanking();
setInterval(cargarRanking, 30000);
</script>
</body>
</html>
