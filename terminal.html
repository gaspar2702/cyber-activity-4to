</head>
<body>

<div class="nav">
    <div class="nav-brand">CYBERCTF</div>
    <div class="nav-links">
        <a href="dashboard.html">DASHBOARD</a>
        <a href="leaderboard.html">RANKING</a>

        <a href="#" onclick="logout()">SALIR</a>
    </div>
    <div class="nav-user">OP: <span id="navUser">—</span></div>
</div>

<div class="page-wrap">

    <div class="panel fade-up" style="margin-bottom:12px;">
        <div class="panel-title">// INFO — DESAFÍOS DE TERMINAL (24–30)</div>
        <div style="font-size:12px; color:var(--text-dim); line-height:1.8;">
            Este emulador simula un sistema Linux. Usa los comandos reales para avanzar.
            Los flags encontrados aquí se ingresan igual en el Dashboard.
        </div>
    </div>

    <div class="terminal-box fade-up">
        <!-- Titlebar -->
        <div class="terminal-titlebar">
            <div class="terminal-dot" style="background:#ff5f57;"></div>
            <div class="terminal-dot" style="background:#febc2e;"></div>
            <div class="terminal-dot" style="background:#28c840;"></div>
            <span style="font-size:11px; color:var(--text-dim); margin-left:8px; font-family:var(--font-mono);">
                ctf-server — bash — 80×24
            </span>
        </div>

        <!-- Output area -->
        <div class="terminal-output" id="output"></div>

        <!-- Input row -->
        <div class="terminal-input-row">
            <span class="terminal-prompt" id="promptLabel">guest@ctf-server:~$</span>
            <input type="text" class="terminal-input" id="termInput"
                   autofocus autocomplete="off" autocorrect="off" spellcheck="false"
                   placeholder="escribe un comando…">
        </div>
    </div>

    <div style="margin-top:12px; display:flex; gap:8px; flex-wrap:wrap;">
        <button onclick="quickCmd('ls -la')"    style="padding:5px 12px; font-size:10px;">ls -la</button>
        <button onclick="quickCmd('cat .secret_flag')" style="padding:5px 12px; font-size:10px;">cat .secret_flag</button>
        <button onclick="quickCmd('whoami')"    style="padding:5px 12px; font-size:10px;">whoami</button>
        <button onclick="quickCmd('nmap 10.0.0.5')" style="padding:5px 12px; font-size:10px;">nmap 10.0.0.5</button>
        <button onclick="clearTerm()"           style="padding:5px 12px; font-size:10px; border-color:var(--red); color:var(--red);">LIMPIAR</button>
    </div>

</div>

<script>
const currentUser = localStorage.getItem("ctf_username") || "guest";
document.getElementById("navUser").textContent = currentUser;
document.getElementById("promptLabel").textContent = `${currentUser}@ctf-server:~$`;

function logout() {
    localStorage.removeItem("ctf_username");
    window.location.href = "index.html";
}

// ── FILESYSTEM SIMULATION ────────────────────────────────
const FS = {
    "~": {
        type: "dir",
        children: {
            ".secret_flag":   { type: "file", content: "flag{secret_file_read}" },
            ".hidden_notes":  { type: "file", content: "Recuerda: la clave SSH es la misma del desafío 08" },
            "readme.txt":     { type: "file", content: "Bienvenido al servidor de entrenamiento CyberCTF.\nUsa 'help' para ver comandos disponibles." },
            "admin_backup":   {
                type: "dir",
                children: {
                    "flag.txt":    { type: "file", content: "flag{admin_backup_accessed}" },
                    "config.bak":  { type: "file", content: "# Config backup\nhost=10.0.0.5\nport=22\nuser=root\npass=hardcoded_p4ssw0rd" },
                }
            },
            "logs":           {
                type: "dir",
                children: {
                    "access.log": { type: "file", content: generateLogs() },
                }
            }
        }
    }
};

function generateLogs() {
    const ips = ["192.168.1.10","10.0.0.42","172.16.0.7","192.168.1.101","10.0.0.99"];
    const pages = ["/index.php","/admin","/login","/dashboard","/api/v1/users"];
    const codes = ["200","200","200","404","403","500"];
    let out = "";
    for (let i = 0; i < 200; i++) {
        const ip = ips[Math.floor(Math.random()*ips.length)];
        const page = pages[Math.floor(Math.random()*pages.length)];
        const code = codes[Math.floor(Math.random()*codes.length)];
        const d = new Date(Date.now() - Math.random()*86400000*7);
        out += `${d.toISOString()} ${ip} GET ${page} HTTP/1.1 ${code} -\n`;
    }
    // Inject the password line
    out += `2024-03-15T14:22:33.000Z 10.0.0.5 POST /login HTTP/1.1 200 - username=root&password=flag{grep_found_password}\n`;
    for (let i = 0; i < 100; i++) {
        const ip = ips[Math.floor(Math.random()*ips.length)];
        const page = pages[Math.floor(Math.random()*pages.length)];
        const code = codes[Math.floor(Math.random()*codes.length)];
        const d = new Date(Date.now() - Math.random()*86400000*3);
        out += `${d.toISOString()} ${ip} GET ${page} HTTP/1.1 ${code} -\n`;
    }
    return out;
}

// ── TERMINAL STATE ───────────────────────────────────────
let cwd = "~";
let cwdPath = ["~"];
let loggedInAs = currentUser;
let sshConnected = false;
let history = [];
let histIdx = -1;

function prompt() {
    const host = sshConnected ? "10.0.0.5" : "ctf-server";
    const user = sshConnected ? "root" : loggedInAs;
    const p = cwdPath.length === 1 ? "~" : cwdPath[cwdPath.length-1];
    return `${user}@${host}:${p}$`;
}

function getNode(pathArr) {
    let node = FS["~"];
    for (let i = 1; i < pathArr.length; i++) {
        if (!node.children || !node.children[pathArr[i]]) return null;
        node = node.children[pathArr[i]];
    }
    return node;
}

// ── BOOT MESSAGE ────────────────────────────────────────
const BOOT = `Linux ctf-server 5.15.0-ctf #1 SMP Mon Jan 01 00:00:00 UTC 2024 x86_64

  ██████╗ ████████╗███████╗     ██████╗████████╗███████╗
  ██╔════╝╚══██╔══╝██╔════╝    ██╔════╝╚══██╔══╝██╔════╝
  ██║        ██║   █████╗      ██║        ██║   █████╗  
  ██║        ██║   ██╔══╝      ██║        ██║   ██╔══╝  
  ╚██████╗   ██║   ██║         ╚██████╗   ██║   ██║     
   ╚═════╝   ╚═╝   ╚═╝          ╚═════╝   ╚═╝   ╚═╝     

  SERVIDOR DE ENTRENAMIENTO — ACCESO AUTORIZADO SOLAMENTE
  Tipo 'help' para ver comandos disponibles.
`;

// ── COMMANDS ─────────────────────────────────────────────
const COMMANDS = {

    help: () => `Comandos disponibles:
  ls [-la]            Listar archivos del directorio actual
  cd <dir>            Cambiar directorio (cd .. para subir)
  cat <archivo>       Leer contenido de un archivo
  pwd                 Mostrar directorio actual
  whoami              Mostrar usuario actual
  grep <pat> <arch>   Buscar patrón en archivo
  nmap <host>         Escanear puertos de un host
  ssh <user>@<host>   Conectar por SSH
  clear               Limpiar pantalla
  help                Mostrar esta ayuda`,

    clear: () => { clearTerm(false); return ""; },

    pwd: () => "/" + cwdPath.join("/").replace("~/", "home/ctf/").replace("~", "home/ctf"),

    whoami: () => {
        if (sshConnected) return "flag{current_user_root}";
        return loggedInAs;
    },

    ls: (args) => {
        const node = getNode(cwdPath);
        if (!node || node.type !== "dir") return "ls: no es un directorio";
        const showHidden = args.includes("-a") || args.includes("-la") || args.includes("-l");
        const entries = Object.entries(node.children || {});
        const visible = showHidden ? entries : entries.filter(([n]) => !n.startsWith("."));

        if (args.includes("-l") || args.includes("-la")) {
            let out = "total " + visible.length * 4 + "\n";
            visible.forEach(([name, n]) => {
                const isDir = n.type === "dir";
                const perm = isDir ? "drwxr-xr-x" : (name.startsWith(".") ? "-rw-------" : "-rw-r--r--");
                const size = isDir ? "4096" : String((n.content || "").length).padStart(6);
                out += `${perm} 1 ${loggedInAs} ${loggedInAs} ${size} Jan 01 00:00 ${isDir ? "\x1b[34m" : ""}${name}${isDir ? "/" : ""}\n`;
            });
            return out.trim();
        }

        return visible.map(([n,v]) => v.type === "dir" ? n + "/" : n).join("  ");
    },

    cd: (args) => {
        const target = args[0];
        if (!target || target === "~") { cwdPath = ["~"]; return ""; }
        if (target === "..") {
            if (cwdPath.length > 1) cwdPath.pop();
            return "";
        }
        const node = getNode(cwdPath);
        if (!node.children || !node.children[target]) return `cd: ${target}: No existe el directorio`;
        if (node.children[target].type !== "dir") return `cd: ${target}: No es un directorio`;
        cwdPath.push(target);
        return "";
    },

    cat: (args) => {
        if (!args[0]) return "cat: faltan argumentos";
        const node = getNode(cwdPath);
        if (!node || !node.children) return `cat: ${args[0]}: No existe el archivo`;
        const file = node.children[args[0]];
        if (!file) return `cat: ${args[0]}: No existe el archivo o directorio`;
        if (file.type === "dir") return `cat: ${args[0]}: Es un directorio`;
        return file.content;
    },

    grep: (args) => {
        if (args.length < 2) return "Uso: grep <patrón> <archivo>";
        const [pattern, filename] = args;
        const node = getNode(cwdPath);
        // Support paths like /var/log/access.log → use logs/access.log
        let file = node?.children?.[filename];
        if (!file && filename.includes("access.log")) {
            file = FS["~"].children["logs"]?.children?.["access.log"];
        }
        if (!file) return `grep: ${filename}: No existe el archivo`;
        const lines = file.content.split("\n").filter(l => l.toLowerCase().includes(pattern.toLowerCase()));
        if (lines.length === 0) return `grep: sin resultados para '${pattern}'`;
        return lines.join("\n");
    },

    nmap: (args) => {
        if (!args[0]) return "Uso: nmap <host>";
        const host = args[0];
        if (host === "10.0.0.5" || host === "localhost") {
            return `Starting Nmap 7.94 ( https://nmap.org )
Nmap scan report for ${host}
Host is up (0.0012s latency).

PORT     STATE SERVICE VERSION
22/tcp   open  ssh     OpenSSH 8.9p1
80/tcp   open  http    nginx 1.22.1
443/tcp  open  https   nginx 1.22.1

# flag{open_port_22_80_443}

Nmap done: 1 IP address (1 host up) scanned in 2.43 seconds`;
        }
        return `Starting Nmap 7.94 ( https://nmap.org )
Note: Host seems down. If it is really up, but blocking ICMP probes, try -Pn
Nmap done: 1 IP address (0 hosts up)`;
    },

    ssh: (args) => {
        if (!args[0]) return "Uso: ssh <usuario>@<host>";
        const parts = args[0].split("@");
        if (parts.length !== 2) return "Formato incorrecto. Usa: ssh usuario@host";
        const [user, host] = parts;

        if (host !== "10.0.0.5") return `ssh: connect to host ${host} port 22: Connection refused`;
        if (user !== "root") return `${user}@${host}: Permission denied (publickey,password).`;

        // Prompt for password (simulate)
        return `__SSH_AUTH__${host}`;
    }
};

function runCommand(input) {
    const trimmed = input.trim();
    if (!trimmed) return "";

    const parts = trimmed.split(/\s+/);
    const cmd = parts[0].toLowerCase();
    const args = parts.slice(1);

    if (COMMANDS[cmd]) {
        const result = COMMANDS[cmd](args);
        if (result && result.startsWith("__SSH_AUTH__")) {
            const host = result.split("__SSH_AUTH__")[1];
            return `__NEED_PASSWORD__${host}`;
        }
        return result;
    }

    // Typo hints
    const similar = Object.keys(COMMANDS).find(c => levenshtein(c, cmd) <= 2);
    if (similar) return `${cmd}: comando no encontrado. ¿Quisiste decir '${similar}'?`;
    return `${cmd}: comando no encontrado. Escribe 'help' para ver los disponibles.`;
}

function levenshtein(a, b) {
    const m = a.length, n = b.length;
    const dp = Array.from({length:m+1}, (_,i) => Array.from({length:n+1}, (_,j) => i||j));
    for (let i=1;i<=m;i++) for (let j=1;j<=n;j++)
        dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
    return dp[m][n];
}

// ── OUTPUT RENDERING ─────────────────────────────────────
const output = document.getElementById("output");

function print(text, color) {
    const line = document.createElement("div");
    if (color) line.style.color = color;
    line.style.whiteSpace = "pre-wrap";
    line.style.wordBreak = "break-all";
    line.textContent = text;
    output.appendChild(line);
    output.scrollTop = output.scrollHeight;
}

function printPromptLine(cmd) {
    const line = document.createElement("div");
    line.innerHTML = `<span style="color:var(--green)">${escHtml(prompt())} </span><span style="color:var(--text)">${escHtml(cmd)}</span>`;
    output.appendChild(line);
    output.scrollTop = output.scrollHeight;
}

function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── SSH PASSWORD PROMPT ──────────────────────────────────
let awaitingPassword = false;
let sshHost = null;

// ── INPUT HANDLING ───────────────────────────────────────
const input = document.getElementById("termInput");
const promptLabel = document.getElementById("promptLabel");

input.addEventListener("keydown", e => {
    if (e.key === "Enter") {
        const val = input.value;

        if (awaitingPassword) {
            printPromptLine("(contraseña oculta)");
            // Accept the hardcoded password from challenge 08
            if (val === "flag{hardcoded_p4ssw0rd}" || val === "hardcoded_p4ssw0rd") {
                sshConnected = true;
                cwdPath = ["~"];
                print(`root@${sshHost}:~$ Autenticación exitosa.`, "var(--green)");
                print(`\nBienvenido a 10.0.0.5 — Servidor Interno CyberCTF\nflag{ssh_root_connected}\n`, "var(--yellow)");
            } else {
                print(`${currentUser}@${sshHost}: Permission denied, please try again.`, "var(--red)");
            }
            awaitingPassword = false;
            sshHost = null;
            input.value = "";
            input.type = "text";
            promptLabel.textContent = prompt();
            return;
        }

        history.unshift(val);
        histIdx = -1;
        printPromptLine(val);
        input.value = "";

        const result = runCommand(val);

        if (result && result.startsWith("__NEED_PASSWORD__")) {
            sshHost = result.split("__NEED_PASSWORD__")[1];
            awaitingPassword = true;
            input.type = "password";
            input.placeholder = "contraseña…";
            print(`${currentUser}@${sshHost}'s password:`, "var(--text-dim)");
            return;
        }

        if (result !== "" && result !== undefined) {
            print(result, result.includes("flag{") ? "var(--yellow)" : undefined);
        }

        promptLabel.textContent = prompt();

    } else if (e.key === "ArrowUp") {
        e.preventDefault();
        if (histIdx < history.length - 1) {
            histIdx++;
            input.value = history[histIdx];
        }
    } else if (e.key === "ArrowDown") {
        e.preventDefault();
        if (histIdx > 0) {
            histIdx--;
            input.value = history[histIdx];
        } else {
            histIdx = -1;
            input.value = "";
        }
    } else if (e.key === "l" && e.ctrlKey) {
        e.preventDefault();
        clearTerm(false);
    }
});

function quickCmd(cmd) {
    input.value = cmd;
    input.focus();
}

function clearTerm(printBoot = true) {
    output.innerHTML = "";
    if (printBoot) {
        print(BOOT, "var(--green)");
        promptLabel.textContent = prompt();
    }
}

// ── INIT ─────────────────────────────────────────────────
print(BOOT, "var(--green)");
promptLabel.textContent = prompt();
input.focus();
</script>
